<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>3D Putter Simulator Pro - Camera Tracking & Auto-Calibrate</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #2e8b57; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        #ui-container { 
            position: absolute; 
            top: 15px; 
            left: 50%; 
            transform: translateX(-50%);
            z-index: 10; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            width: 85%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button { 
            padding: 10px 20px; 
            font-size: 16px; 
            font-weight: bold;
            background: #e74c3c; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%;
            transition: 0.2s;
        }
        button:active { background: #c0392b; }
        .slider-group {
            background: #f9f9f9;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .slider-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 12px;
            font-weight: bold;
            color: #333;
        }
        .slider-container label { flex-shrink: 0; width: 90px; }
        input[type="range"] { flex-grow: 1; }
        .val-display { width: 35px; text-align: right; color: #e74c3c; }
        
        .calibration-panel {
            background: #eef2f3;
            padding: 10px;
            border-radius: 8px;
            border: 1px dashed #7f8c8d;
            font-size: 12px;
            color: #333;
        }
        .cal-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
        }
        .cal-row input {
            width: 60px;
            padding: 4px;
            font-size: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }
        .cal-btn {
            background: #2980b9;
            font-size: 14px;
            margin-top: 8px;
            padding: 8px;
        }
        .cal-btn:active { background: #1f618d; }

        #status { 
            font-weight: 600; 
            color: #555; 
            text-align: center;
            font-size: 13px;
            margin-top: 5px;
        }
        .data-display {
            font-size: 16px;
            font-weight: 900;
            color: #333; 
            text-align: center;
            background: #f0f8ff;
            padding: 8px;
            border-radius: 8px;
            border: 2px solid #e74c3c;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .dist { color: #b22222; font-size: 20px; }
        .dir { color: #2E8B57; font-size: 14px; }
        
        #cameraContainer {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 120px;
            height: 90px;
            border: 3px solid #fff;
            border-radius: 8px;
            overflow: hidden;
            z-index: 20;
            background: #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #trackerCanvas {
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-container">
        <div style="text-align:center; font-weight:bold; color:#333; font-size: 13px;">Place phone facing you. Putt across the camera view.</div>
        
        <div class="slider-group">
            <div class="slider-container">
                <label>Smash Factor:</label>
                <input type="range" id="smash" min="0.5" max="2.5" step="0.01" value="1.00">
                <span id="smashValue" class="val-display">1.00</span>
            </div>
            <div class="slider-container">
                <label>Stimp (Green):</label>
                <input type="range" id="stimp" min="4" max="20" step="0.1" value="10.0">
                <span id="stimpValue" class="val-display">10.0</span>
            </div>
        </div>

        <div class="calibration-panel">
            <strong>Auto-Calibration:</strong> Enter distances in yards (e.g. 5.5)
            <div class="cal-row">
                <span>Short Putt:</span>
                <input type="number" id="appShort" placeholder="App Yds">
                <input type="number" id="realShort" placeholder="Real Yds">
            </div>
            <div class="cal-row">
                <span>Long Putt:</span>
                <input type="number" id="appLong" placeholder="App Yds">
                <input type="number" id="realLong" placeholder="Real Yds">
            </div>
            <button id="calcBtn" class="cal-btn">Calculate & Apply Settings</button>
        </div>

        <button id="startBtn">Start Camera Tracking</button>
        <div id="status">Waiting for camera...</div>
        
        <div class="data-display">
            <div id="distanceDisplay" class="dist">Dist: 0y 0f</div>
            <div id="directionDisplay" class="dir">Face: Locked Square</div>
        </div>
    </div>

    <div id="cameraContainer">
        <canvas id="trackerCanvas"></canvas>
    </div>

    <script>
        // --- 1. SETUP THREE.JS SCENE ---
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 6, 2); 

        const TEE_POS = { x: -0.16, y: -2.475, z: 0.45 }; 
        camera.lookAt(TEE_POS.x - 1, TEE_POS.y, TEE_POS.z);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        const gridHelper = new THREE.GridHelper(40, 40, 0xffffff, 0xffffff);
        gridHelper.position.y = -2.575; 
        gridHelper.material.opacity = 0.3;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // --- 2. BUILD THE 3D MANNEQUIN ---
        const skinMat = new THREE.MeshLambertMaterial({ color: 0xffccaa });
        const shirtMat = new THREE.MeshLambertMaterial({ color: 0xe74c3c });
        const pantsMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const clubMat = new THREE.MeshLambertMaterial({ color: 0xdcdcdc });
        const gripMat = new THREE.MeshLambertMaterial({ color: 0x111111 });

        const leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.15, 2), pantsMat);
        leftLeg.position.set(-0.4, 0, 0); 
        scene.add(leftLeg);
        
        const rightLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.15, 2), pantsMat);
        rightLeg.position.set(0.4, 0, 0); 
        scene.add(rightLeg);

        const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.8, 0.6), shirtMat);
        torso.position.set(0, 1.9, 0);
        scene.add(torso);

        const head = new THREE.Mesh(new THREE.SphereGeometry(0.4), skinMat);
        head.position.set(0, 3.2, 0);
        scene.add(head);

        const pivot = new THREE.Group();
        pivot.position.set(0, 2.5, 0.4); 
        pivot.rotation.order = "YXZ"; 
        scene.add(pivot);

        const arms = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.1, 2), skinMat);
        arms.position.set(0, -1, 0);
        pivot.add(arms);

        const grip = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 0.8), gripMat);
        grip.position.set(0, -2.2, 0);
        pivot.add(grip);

        const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.03, 2.5), clubMat);
        shaft.position.set(0, -3.8, 0);
        pivot.add(shaft);

        const clubHead = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.15, 0.3), clubMat);
        clubHead.position.set(0.15, -5, 0.05); 
        pivot.add(clubHead);

        const ballRadius = 0.1;
        const ball = new THREE.Mesh(
            new THREE.SphereGeometry(ballRadius, 32, 32), 
            new THREE.MeshLambertMaterial({ color: 0xffffff })
        );
        ball.position.set(TEE_POS.x, TEE_POS.y, TEE_POS.z);
        scene.add(ball);

        // --- 3. STATE VARIABLES ---
        let targetRotZ = 0;
        let currRotZ = 0;
        
        let ballVelX = 0;
        let ballVelZ = 0;
        let lastClubPos = new THREE.Vector3();
        let currentClubPos = new THREE.Vector3();

        // --- 4. UI AND CALIBRATION LOGIC ---
        const smashSlider = document.getElementById('smash');
        const smashValue = document.getElementById('smashValue');
        smashSlider.addEventListener('input', () => smashValue.innerText = parseFloat(smashSlider.value).toFixed(2));

        const stimpSlider = document.getElementById('stimp');
        const stimpValue = document.getElementById('stimpValue');
        stimpSlider.addEventListener('input', () => stimpValue.innerText = parseFloat(stimpSlider.value).toFixed(1));

        const calcBtn = document.getElementById('calcBtn');
        calcBtn.addEventListener('click', () => {
            let aS = parseFloat(document.getElementById('appShort').value);
            let rS = parseFloat(document.getElementById('realShort').value);
            let aL = parseFloat(document.getElementById('appLong').value);
            let rL = parseFloat(document.getElementById('realLong').value);

            if (aS && rS && aL && rL) {
                // Determine the distance multiplier needed
                let ratioShort = rS / aS;
                let ratioLong = rL / aL;
                let avgRatio = (ratioShort + ratioLong) / 2;

                // Distribute the multiplier evenly across Smash and Stimp
                let distributionFactor = Math.sqrt(avgRatio);
                
                let newSmash = 1.0 * Math.sqrt(distributionFactor); // Smash is squared in physics
                let newStimp = 10.0 * distributionFactor;          // Stimp is linear

                // Clamp limits so the sliders don't break
                newSmash = Math.max(0.5, Math.min(2.5, newSmash));
                newStimp = Math.max(4.0, Math.min(20.0, newStimp));

                // Apply values
                smashSlider.value = newSmash;
                smashValue.innerText = newSmash.toFixed(2);
                stimpSlider.value = newStimp;
                stimpValue.innerText = newStimp.toFixed(1);

                alert(`Success!\nCalibrated Smash Factor to: ${newSmash.toFixed(2)}\nCalibrated Stimp to: ${newStimp.toFixed(1)}`);
            } else {
                alert("Please fill out all 4 distance fields to calibrate.");
            }
        });

        // --- 5. CAMERA TRACKING SETUP ---
        const videoElement = document.createElement('video');
        videoElement.setAttribute('playsinline', '');
        videoElement.setAttribute('autoplay', '');
        
        const trackerCanvas = document.getElementById('trackerCanvas');
        const ctx = trackerCanvas.getContext('2d', { willReadFrequently: true });
        
        const C_WIDTH = 160;
        const C_HEIGHT = 120;
        trackerCanvas.width = C_WIDTH;
        trackerCanvas.height = C_HEIGHT;

        let cameraActive = false;
        const startBtn = document.getElementById('startBtn');
        const statusTxt = document.getElementById('status');
        const distanceDisplay = document.getElementById('distanceDisplay');

        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: C_WIDTH }, height: { ideal: C_HEIGHT } } 
                });
                videoElement.srcObject = stream;
                
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    cameraActive = true;
                    startBtn.style.display = 'none';
                    statusTxt.innerText = "Tracking Active! Move red shaft.";
                };
            } catch (err) {
                statusTxt.innerText = "Error: Allow Camera Access!";
            }
        });

        function trackRedShaft() {
            if (!cameraActive || videoElement.readyState !== videoElement.HAVE_ENOUGH_DATA) return;

            ctx.drawImage(videoElement, 0, 0, C_WIDTH, C_HEIGHT);
            const frame = ctx.getImageData(0, 0, C_WIDTH, C_HEIGHT);
            const data = frame.data;

            let sumX = 0;
            let count = 0;

            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i+1];
                let b = data[i+2];

                if (r > 130 && r > g * 1.6 && r > b * 1.6) {
                    let x = (i / 4) % C_WIDTH;
                    sumX += x;
                    count++;
                    data[i] = 255; data[i+1] = 0; data[i+2] = 255;
                }
            }

            ctx.putImageData(frame, 0, 0);

            if (count > 15) {
                let avgX = sumX / count;
                // Base direct mapping without sensitivity multiplier
                let normalizedX = -1 * (((avgX / C_WIDTH) - 0.5) * 2); 
                targetRotZ = normalizedX * 0.8; 
            }
        }

        function calculateDistance(velX, velZ, friction) {
            let v0 = Math.sqrt(velX * velX + velZ * velZ);
            let distanceUnits = (v0 * v0) / (2 * friction);
            let rawYards = distanceUnits * 3.5; 
            
            let yards = Math.floor(rawYards);
            let feet = Math.round((rawYards - yards) * 3);
            if (feet === 3) { yards += 1; feet = 0; }
            return { yards, feet };
        }

        // --- 6. ANIMATION & PHYSICS ENGINE ---
        function animate() {
            requestAnimationFrame(animate);
            
            trackRedShaft();

            currRotZ += (targetRotZ - currRotZ) * 0.15;
            pivot.rotation.z = currRotZ;

            clubHead.getWorldPosition(currentClubPos);
            let currentStimp = parseFloat(stimpSlider.value);
            let dynamicFriction = 0.0012 * (10 / currentStimp); 

            if (ballVelX === 0 && ballVelZ === 0) {
                let faceWorldX = currentClubPos.x - 0.2; 
                let lastFaceWorldX = lastClubPos.x - 0.2;
                let ballRightEdge = ball.position.x + ballRadius;

                if (lastFaceWorldX > ballRightEdge && faceWorldX <= ballRightEdge) {
                    let clubSpeed = Math.abs(currentClubPos.x - lastClubPos.x);
                    
                    if (clubSpeed > 0.005) { 
                        let smash = parseFloat(smashSlider.value);
                        let physicsScale = 1.5; 
                        
                        ballVelX = -clubSpeed * smash * physicsScale; 
                        
                        let d = calculateDistance(ballVelX, ballVelZ, dynamicFriction);
                        distanceDisplay.innerText = `Dist: ${d.yards}y ${d.feet}f`;
                        
                        setTimeout(() => {
                            ballVelX = 0; ballVelZ = 0;
                            ball.position.set(TEE_POS.x, TEE_POS.y, TEE_POS.z);
                        }, 4000);
                    }
                }
            }
            
            lastClubPos.copy(currentClubPos);

            if (Math.abs(ballVelX) > 0 || Math.abs(ballVelZ) > 0) {
                ball.position.x += ballVelX;
                ball.position.z += ballVelZ;
                
                let speed = Math.sqrt(ballVelX * ballVelX + ballVelZ * ballVelZ);
                
                if (speed > dynamicFriction) {
                    let dropX = (Math.abs(ballVelX) / speed) * dynamicFriction;
                    let dropZ = (Math.abs(ballVelZ) / speed) * dynamicFriction;
                    
                    if (ballVelX > 0) ballVelX = Math.max(0, ballVelX - dropX);
                    else ballVelX = Math.min(0, ballVelX + dropX);
                    
                    if (ballVelZ > 0) ballVelZ = Math.max(0, ballVelZ - dropZ);
                    else ballVelZ = Math.min(0, ballVelZ + dropZ);
                } else {
                    ballVelX = 0; ballVelZ = 0;
                }
            }

            renderer.render(scene, camera);
        }
        
        clubHead.getWorldPosition(lastClubPos);
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
