<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>3D Putter Simulator Pro - Vision Tracking</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #2e8b57; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        #ui-container { 
            position: absolute; 
            top: 15px; 
            left: 50%; 
            transform: translateX(-50%);
            z-index: 10; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            width: 85%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button { 
            padding: 10px 20px; 
            font-size: 16px; 
            font-weight: bold;
            background: #1E90FF; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%;
            transition: 0.2s;
        }
        button:active { background: #187bcd; }
        .slider-group {
            background: #f9f9f9;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .slider-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 12px;
            font-weight: bold;
            color: #333;
            margin-top: 4px;
        }
        .slider-container label { flex-shrink: 0; width: 90px; }
        input[type="range"] { flex-grow: 1; }
        .val-display { width: 45px; text-align: right; color: #1E90FF; font-family: monospace; }
        
        #status { 
            font-weight: 600; 
            color: #555; 
            text-align: center;
            font-size: 13px;
            margin-top: 5px;
        }
        .data-display {
            font-size: 16px;
            font-weight: 900;
            color: #333; 
            text-align: center;
            background: #f0f8ff;
            padding: 8px;
            border-radius: 8px;
            border: 2px solid #1E90FF;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .dist { color: #b22222; font-size: 20px; }
        .dir { color: #2E8B57; font-size: 14px; }
        
        /* Debug Camera View */
        #cv-container {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 160px;
            height: 213px; /* 3:4 aspect ratio typical for front cams */
            background: #000;
            border: 3px solid #fff;
            border-radius: 8px;
            overflow: hidden;
            z-index: 20;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #cv-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #debug-text {
            position: absolute;
            top: 2px; left: 2px;
            color: lime; font-size: 10px; font-weight: bold;
            text-shadow: 1px 1px 0 #000;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-container">
        <div class="slider-group">
            <div class="slider-container">
                <label>Vision Putter Length:</label>
                <input type="range" id="putterLengthPixels" min="50" max="400" step="1" value="210">
                <span id="putterLengthValue" class="val-display">210px</span>
            </div>
            <div class="slider-container">
                <label>Swing Sensitivity:</label>
                <input type="range" id="sensitivity" min="0.5" max="5.0" step="0.1" value="2.5">
                <span id="sensValue" class="val-display">2.5x</span>
            </div>
            <div class="slider-container">
                <label>Smash Factor:</label>
                <input type="range" id="smash" min="1.0" max="1.5" step="0.01" value="1.15">
                <span id="smashValue" class="val-display">1.15</span>
            </div>
            <div class="slider-container">
                <label>Stimp (Green):</label>
                <input type="range" id="stimp" min="6" max="14" step="0.5" value="10">
                <span id="stimpValue" class="val-display">10</span>
            </div>
        </div>

        <button id="startBtn">Start & Calibrate Camera</button>
        <button id="calibrateBtn" style="display:none; background:#555;">Recalibrate Center</button>
        <div id="status">Waiting to start...</div>
        
        <div class="data-display">
            <div id="distanceDisplay" class="dist">Dist: 0y 0f</div>
            <div id="directionDisplay" class="dir">Path: --</div>
        </div>
    </div>

    <!-- Hidden Video Element for capturing webcam feed -->
    <video id="video-stream" autoplay playsinline muted style="display:none;"></video>
    
    <!-- Mini view so user can see what the algorithm sees -->
    <div id="cv-container">
        <canvas id="cv-canvas"></canvas>
        <div id="debug-text">Camera Off</div>
    </div>

    <script>
        // ==========================================
        // 1. SETUP THREE.JS SCENE (Visualizer)
        // ==========================================
        const scene = new THREE.Scene();
        
        // CAMERA: Elevated Bird's Eye & Down-the-Line
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 6, 2); 

        const TEE_POS = { x: -0.16, y: -2.475, z: 0.45 }; 
        camera.lookAt(TEE_POS.x - 1, TEE_POS.y, TEE_POS.z);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        const gridHelper = new THREE.GridHelper(40, 40, 0xffffff, 0xffffff);
        gridHelper.position.y = -2.575; 
        gridHelper.material.opacity = 0.3;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // ==========================================
        // 2. BUILD THE 3D MANNEQUIN 
        // ==========================================
        const skinMat = new THREE.MeshLambertMaterial({ color: 0xffccaa });
        const shirtMat = new THREE.MeshLambertMaterial({ color: 0x2196F3 });
        const pantsMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const clubMat = new THREE.MeshLambertMaterial({ color: 0xdcdcdc });
        const gripMat = new THREE.MeshLambertMaterial({ color: 0x111111 });

        const leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.15, 2), pantsMat);
        leftLeg.position.set(-0.4, 0, 0); scene.add(leftLeg);
        const rightLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.15, 2), pantsMat);
        rightLeg.position.set(0.4, 0, 0); scene.add(rightLeg);

        const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.8, 0.6), shirtMat);
        torso.position.set(0, 1.9, 0); scene.add(torso);

        const head = new THREE.Mesh(new THREE.SphereGeometry(0.4), skinMat);
        head.position.set(0, 3.2, 0); scene.add(head);

        const pivot = new THREE.Group();
        pivot.position.set(0, 2.5, 0.4); 
        pivot.rotation.order = "YXZ"; 
        scene.add(pivot);

        const arms = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.1, 2), skinMat);
        arms.position.set(0, -1, 0); pivot.add(arms);

        const grip = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 0.8), gripMat);
        grip.position.set(0, -2.2, 0); pivot.add(grip);

        const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.03, 2.5), clubMat);
        shaft.position.set(0, -3.8, 0); pivot.add(shaft);

        const clubHead = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.15, 0.3), clubMat);
        clubHead.position.set(0.15, -5, 0.05); pivot.add(clubHead);

        const ballRadius = 0.1;
        const ball = new THREE.Mesh(new THREE.SphereGeometry(ballRadius, 32, 32), new THREE.MeshLambertMaterial({ color: 0xffffff }));
        ball.position.set(TEE_POS.x, TEE_POS.y, TEE_POS.z);
        scene.add(ball);

        // ==========================================
        // 3. VISION TRACKING ENGINE
        // ==========================================
        const video = document.getElementById('video-stream');
        const cvCanvas = document.getElementById('cv-canvas');
        const cvCtx = cvCanvas.getContext('2d', { willReadFrequently: true });
        const debugText = document.getElementById('debug-text');

        // Tracking processing resolution (smaller = faster)
        const PROC_WIDTH = 240; 
        const PROC_HEIGHT = 320; 
        
        let baseAngle = null; 
        let currentShaftAngle = 0;
        let lastHeadX_px = null; // Position of projected putter head in pixels
        
        let targetRotZ = 0; // The mapped swing angle for 3D
        let currRotZ = 0;   // Smoothed swing angle
        let currRotY = 0;

        let lastMoveTime = Date.now(); 
        const RESET_DELAY = 3000;    

        let ballVelX = 0;
        let ballVelZ = 0;
        let lastClubPos = new THREE.Vector3();
        let currentClubPos = new THREE.Vector3();

        // UI Elements & Listeners
        const startBtn = document.getElementById('startBtn');
        const calibrateBtn = document.getElementById('calibrateBtn');
        const statusTxt = document.getElementById('status');
        const distanceDisplay = document.getElementById('distanceDisplay');
        const directionDisplay = document.getElementById('directionDisplay');

        const putterLengthSlider = document.getElementById('putterLengthPixels');
        const putterLengthValue = document.getElementById('putterLengthValue');
        putterLengthSlider.addEventListener('input', () => putterLengthValue.innerText = putterLengthSlider.value + "px");

        const sensitivitySlider = document.getElementById('sensitivity');
        const sensValue = document.getElementById('sensValue');
        sensitivitySlider.addEventListener('input', () => sensValue.innerText = sensitivitySlider.value + "x");

        const smashSlider = document.getElementById('smash');
        const smashValue = document.getElementById('smashValue');
        smashSlider.addEventListener('input', () => smashValue.innerText = smashSlider.value);

        const stimpSlider = document.getElementById('stimp');
        const stimpValue = document.getElementById('stimpValue');
        stimpSlider.addEventListener('input', () => stimpValue.innerText = stimpSlider.value);

        // Utility: RGB to HSV for color filtering
        function rgbToHsv(r, g, b) {
            r /= 255, g /= 255, b /= 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, v = max;
            let d = max - min;
            s = max == 0 ? 0 : d / max;
            if (max == min) { h = 0; }
            else {
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return [h * 360, s, v];
        }

        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: PROC_WIDTH }, height: { ideal: PROC_HEIGHT } } 
                });
                video.srcObject = stream;
                video.play();
                
                video.onloadedmetadata = () => {
                    cvCanvas.width = PROC_WIDTH;
                    cvCanvas.height = PROC_HEIGHT;
                    startBtn.style.display = 'none'; 
                    calibrateBtn.style.display = 'block';
                    statusTxt.innerText = "Camera Active. Stand still to calibrate.";
                    trackFrame();
                };
            } catch (err) {
                statusTxt.innerText = "Camera error: " + err.message;
            }
        });

        calibrateBtn.addEventListener('click', () => {
            baseAngle = null; 
            lastMoveTime = Date.now();
            statusTxt.innerText = "Center Re-Calibrated";
        });

        // Main Vision Loop
        function trackFrame() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                cvCtx.drawImage(video, 0, 0, PROC_WIDTH, PROC_HEIGHT);
                const frameData = cvCtx.getImageData(0, 0, PROC_WIDTH, PROC_HEIGHT);
                const data = frameData.data;

                let blueSumX = 0, blueSumY = 0, blueCount = 0;
                let redSumX = 0, redSumY = 0, redCount = 0;

                // Step 1: Find the Light Blue Strip
                // We sample every 4th pixel to save CPU
                for (let i = 0; i < data.length; i += 16) {
                    let r = data[i];
                    let g = data[i+1];
                    let b = data[i+2];
                    
                    const [h, s, v] = rgbToHsv(r, g, b);
                    
                    // Light Blue / Cyan Hue (approx 150-250)
                    if (h > 150 && h < 250 && s > 0.25 && v > 0.35) { // Relaxed V slightly for backlit conditions
                        let px = (i / 4) % PROC_WIDTH;
                        let py = Math.floor((i / 4) / PROC_WIDTH);
                        blueSumX += px;
                        blueSumY += py;
                        blueCount++;
                    }
                }

                if (blueCount > 5) {
                    let blueX = blueSumX / blueCount;
                    let blueY = blueSumY / blueCount;

                    // Step 2: Find the Red Shaft strictly BELOW the blue strip
                    for (let i = 0; i < data.length; i += 16) {
                        let py = Math.floor((i / 4) / PROC_WIDTH);
                        
                        // "Do not look for any red above that blue strip"
                        if (py < blueY) continue; 

                        let r = data[i];
                        let g = data[i+1];
                        let b = data[i+2];
                        
                        const [h, s, v] = rgbToHsv(r, g, b);
                        
                        // Red Hue (wraps around 0/360). Relaxed S and V slightly.
                        if ((h < 25 || h > 335) && s > 0.35 && v > 0.3) {
                            let px = (i / 4) % PROC_WIDTH;
                            redSumX += px;
                            redSumY += py;
                            redCount++;
                        }
                    }

                    if (redCount > 5) {
                        let redX = redSumX / redCount;
                        let redY = redSumY / redCount;

                        // Step 3: Calculate Angle & Extrapolate Club Head Position
                        // currentShaftAngle = atan2(dx, dy) where dx=horizontal, dy=vertical
                        let dx = redX - blueX;
                        let dy = redY - blueY;
                        currentShaftAngle = Math.atan2(dx, dy); 

                        // Handle Calibration on first read or reset
                        if (baseAngle === null) {
                            baseAngle = currentShaftAngle;
                            ball.position.set(TEE_POS.x, TEE_POS.y, TEE_POS.z);
                            ballVelX = 0; ballVelZ = 0;
                            lastHeadX_px = null; // Reset visual speed tracking
                        }

                        let angleDelta = currentShaftAngle - baseAngle;
                        let sensMulti = parseFloat(sensitivitySlider.value);
                        
                        // Map the 2D angle change to the 3D target rotation
                        // This drives the visual mannequin
                        targetRotZ = angleDelta * sensMulti;

                        // Step 4: PROJECT THE PUTTER HEAD for speed tracking
                        // User stated length is 20 inches from the blue strip.
                        // Sensitivity slider maps 2D angle change to logical degrees.
                        // We use the slider value as the *base pixel distance* for 20 inches.
                        const pixelDist_20in = parseFloat(putterLengthSlider.value);
                        const projectLength_px = pixelDist_20in * sensMulti; // Scaled length for logical inches

                        const headX_px = blueX + projectLength_px * Math.sin(currentShaftAngle);
                        const headY_px = blueY + projectLength_px * Math.cos(currentShaftAngle);

                        // Draw Debug Graphics
                        // Blue Box (Centroid)
                        cvCtx.fillStyle = '#00FFFF';
                        cvCtx.fillRect(blueX-4, blueY-4, 8, 8);
                        
                        // Red Box (Centroid of variable visible shaft)
                        cvCtx.fillStyle = '#FF0000';
                        cvCtx.fillRect(redX-4, redY-4, 8, 8);

                        // Debug Line connecting centroids (to show the raw shaft direction)
                        cvCtx.strokeStyle = 'white';
                        cvCtx.lineWidth = 1;
                        cvCtx.beginPath();
                        cvCtx.moveTo(blueX, blueY);
                        cvCtx.lineTo(redX, redY);
                        cvCtx.stroke();

                        // Green 'X' marker for PROJECTED head position
                        cvCtx.fillStyle = '#00FF00';
                        cvCtx.font = 'bold 20px sans-serif';
                        cvCtx.fillText('X', headX_px - 8, headY_px + 8);
                        
                        // Activity tracking to prevent auto-reset mid swing
                        if (Math.abs(angleDelta) > 0.05) {
                            lastMoveTime = Date.now();
                            statusTxt.innerText = "Tracking Swing...";
                        }
                    } else {
                        // Red not found below blue
                        debugText.innerText = `Blue: ${blueCount} | Red (Below Blue): 0`;
                    }
                } else {
                    // Blue not found
                    debugText.innerText = `Blue: 0 | Red: ${redCount}`;
                }
            }
            requestAnimationFrame(trackFrame); // Loop vision processing
        }

        // ==========================================
        // 4. PHYSICS ENGINE & ANIMATION
        // ==========================================
        function calculateDistance(velX, velZ, friction) {
            let v0 = Math.sqrt(velX * velX + velZ * velZ);
            let distanceUnits = (v0 * v0) / (2 * friction);
            let rawYards = distanceUnits * 3.5; 
            
            let yards = Math.floor(rawYards);
            let feet = Math.round((rawYards - yards) * 3);
            if (feet === 3) { yards += 1; feet = 0; }
            return { yards, feet };
        }

        function animate() {
            requestAnimationFrame(animate);
            const now = Date.now();
            
            // --- IDLE AUTO-CALIBRATION ---
            if (now - lastMoveTime > RESET_DELAY && baseAngle !== null) {
                baseAngle = currentShaftAngle;
                targetRotZ = 0;
                lastHeadX_px = null; // Clear vision speed tracking on reset
                statusTxt.innerText = "Idle - Center Calibrated";
                
                if (ballVelX === 0 && ballVelZ === 0) {
                    ball.position.set(TEE_POS.x, TEE_POS.y, TEE_POS.z);
                }
            }

            // --- 3D MANNEQUIN MOVEMENT ---
            // Smoothly interpolate to target rotation (exponential moving average)
            currRotZ += (targetRotZ - currRotZ) * 0.2;
            pivot.rotation.z = currRotZ;

            // --- Green rolling face angle - currently set square (no Y tracking) ---
            pivot.rotation.y = currRotY;

            clubHead.getWorldPosition(currentClubPos);

            // --- KINETICS & COLLISION SETUP ---
            let currentStimp = parseFloat(stimpSlider.value);
            let dynamicFriction = 0.0012 * (10 / currentStimp); 

            // --- HIT DETECTION ---
            if (ballVelX === 0 && ballVelZ === 0 && baseAngle !== null) {
                let faceWorldX = currentClubPos.x - 0.2; 
                let lastFaceWorldX = lastClubPos.x - 0.2;
                let ballRightEdge = ball.position.x + ballRadius;

                // Crossed the ball threshold in 3D
                if (lastFaceWorldX > ballRightEdge && faceWorldX <= ballRightEdge) {
                    
                    // --- Speed Calculation relying on Vision Head Position Displacement ---
                    // "Get putter head speed from shaft angle and displacement over time"
                    // currentShaftAngle, baseAngle are available. 
                    
                    if (lastHeadX_px !== null) {
                        // Project the *current logical head pixel position*
                        const pixelDist_20in = parseFloat(putterLengthSlider.value);
                        const sensMulti = parseFloat(sensitivitySlider.value);
                        const projectLength_px = pixelDist_20in * sensMulti;

                        const headX_px = PROC_WIDTH / 2 + projectLength_px * Math.sin(currentShaftAngle);
                        
                        // Pixel displacement per frame
                        const deltaX_px = Math.abs(headX_px - lastHeadX_px);
                        
                        // Convert pixel delta to speed (rough calibration constant)
                        let clubSpeed = deltaX_px * 0.003; 
                        
                        if (clubSpeed > 0.005) { 
                            let smash = parseFloat(smashSlider.value);
                            //physicsScale maps speed to visual yards
                            let physicsScale = 1.3; 
                            
                            ballVelX = -clubSpeed * smash * physicsScale; 
                            ballVelZ = currRotY * clubSpeed * smash * physicsScale; 

                            let d = calculateDistance(ballVelX, ballVelZ, dynamicFriction);
                            distanceDisplay.innerText = `Dist: ${d.yards}y ${d.feet}f`;
                            directionDisplay.innerText = "Face: Square"; // Vision face angle not tracked yet
                        }
                    }
                }
                
                // Track 2D head position over time for the next frame's speed calculation
                // Re-project here so we have it for the next physics loop
                const pixelDist_20in = parseFloat(putterLengthSlider.value);
                const sensMulti = parseFloat(sensitivitySlider.value);
                const projectLength_px = pixelDist_20in * sensMulti;
                lastHeadX_px = PROC_WIDTH / 2 + projectLength_px * Math.sin(currentShaftAngle);
            }
            
            lastClubPos.copy(currentClubPos);

            // --- GREEN ROLLING PHYSICS ---
            if (Math.abs(ballVelX) > 0 || Math.abs(ballVelZ) > 0) {
                ball.position.x += ballVelX;
                ball.position.z += ballVelZ;
                
                let speed = Math.sqrt(ballVelX * ballVelX + ballVelZ * ballVelZ);
                
                if (speed > dynamicFriction) {
                    let dropX = (Math.abs(ballVelX) / speed) * dynamicFriction;
                    let dropZ = (Math.abs(ballVelZ) / speed) * dynamicFriction;
                    
                    if (ballVelX > 0) ballVelX = Math.max(0, ballVelX - dropX);
                    else ballVelX = Math.min(0, ballVelX + dropX);
                    
                    if (ballVelZ > 0) ballVelZ = Math.max(0, ballVelZ - dropZ);
                    else ballVelZ = Math.min(0, ballVelZ + dropZ);
                } else {
                    ballVelX = 0; ballVelZ = 0;
                }
            }

            renderer.render(scene, camera);
        }
        
        clubHead.getWorldPosition(lastClubPos);
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
