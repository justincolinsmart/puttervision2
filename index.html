<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>3D Putter Simulator Pro - Bounding Box Tracking</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #2e8b57; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        #ui-container { 
            position: absolute; 
            top: 15px; 
            left: 50%; 
            transform: translateX(-50%);
            z-index: 10; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            width: 85%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button { 
            padding: 10px 20px; 
            font-size: 16px; 
            font-weight: bold;
            background: #1E90FF; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%;
            transition: 0.2s;
        }
        button:active { background: #187bcd; }
        .slider-group {
            background: #f9f9f9;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .slider-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 12px;
            font-weight: bold;
            color: #333;
            margin-top: 4px;
        }
        .slider-container label { flex-shrink: 0; width: 90px; }
        input[type="range"] { flex-grow: 1; }
        .val-display { width: 45px; text-align: right; color: #1E90FF; font-family: monospace; }
        
        #status { 
            font-weight: 600; 
            color: #555; 
            text-align: center;
            font-size: 13px;
            margin-top: 5px;
        }
        .data-display {
            font-size: 16px;
            font-weight: 900;
            color: #333; 
            text-align: center;
            background: #f0f8ff;
            padding: 8px;
            border-radius: 8px;
            border: 2px solid #1E90FF;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .dist { color: #b22222; font-size: 20px; }
        .dir { color: #2E8B57; font-size: 14px; }
        
        /* Debug Camera View */
        #cv-container {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 160px;
            height: 213px; 
            background: #000;
            border: 3px solid #fff;
            border-radius: 8px;
            overflow: hidden;
            z-index: 20;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #cv-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #debug-text {
            position: absolute;
            top: 2px; left: 2px;
            color: lime; font-size: 10px; font-weight: bold;
            text-shadow: 1px 1px 0 #000;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-container">
        <div class="slider-group">
            <div class="slider-container">
                <label>3D Swing Scale:</label>
                <input type="range" id="sensitivity" min="0.5" max="5.0" step="0.1" value="2.5">
                <span id="sensValue" class="val-display">2.5x</span>
            </div>
            <div class="slider-container">
                <label>Smash Factor:</label>
                <input type="range" id="smash" min="1.0" max="1.5" step="0.01" value="1.15">
                <span id="smashValue" class="val-display">1.15</span>
            </div>
            <div class="slider-container">
                <label>Stimp (Green):</label>
                <input type="range" id="stimp" min="6" max="14" step="0.5" value="10">
                <span id="stimpValue" class="val-display">10</span>
            </div>
        </div>

        <button id="startBtn">Start Camera</button>
        <button id="calibrateBtn" style="display:none; background:#dc3545;">Reset Ball & Tracking</button>
        <div id="status">Waiting to start...</div>
        
        <div class="data-display">
            <div id="distanceDisplay" class="dist">Dist: 0y 0f</div>
            <div id="directionDisplay" class="dir">Speed: 0.00 m/s</div>
        </div>
    </div>

    <video id="video-stream" autoplay playsinline muted style="display:none;"></video>
    
    <div id="cv-container">
        <canvas id="cv-canvas"></canvas>
        <div id="debug-text">Camera Off</div>
    </div>

    <script>
        // ==========================================
        // 1. SETUP THREE.JS SCENE (Visualizer)
        // ==========================================
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 6, 2); 

        const TEE_POS = { x: -0.16, y: -2.475, z: 0.45 }; 
        camera.lookAt(TEE_POS.x - 1, TEE_POS.y, TEE_POS.z);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        const gridHelper = new THREE.GridHelper(40, 40, 0xffffff, 0xffffff);
        gridHelper.position.y = -2.575; 
        gridHelper.material.opacity = 0.3;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // ==========================================
        // 2. BUILD THE 3D MANNEQUIN 
        // ==========================================
        const skinMat = new THREE.MeshLambertMaterial({ color: 0xffccaa });
        const shirtMat = new THREE.MeshLambertMaterial({ color: 0x2196F3 });
        const pantsMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const shaftMat = new THREE.MeshLambertMaterial({ color: 0xcc0000 }); 
        const gripMat = new THREE.MeshLambertMaterial({ color: 0xffffff }); 
        const collarMat = new THREE.MeshLambertMaterial({ color: 0x00cccc }); 
        const headMat = new THREE.MeshLambertMaterial({ color: 0x222222 }); 

        const leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.15, 2), pantsMat);
        leftLeg.position.set(-0.4, 0, 0); scene.add(leftLeg);
        const rightLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.15, 2), pantsMat);
        rightLeg.position.set(0.4, 0, 0); scene.add(rightLeg);

        const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.8, 0.6), shirtMat);
        torso.position.set(0, 1.9, 0); scene.add(torso);

        const head = new THREE.Mesh(new THREE.SphereGeometry(0.4), skinMat);
        head.position.set(0, 3.2, 0); scene.add(head);

        const pivot = new THREE.Group();
        pivot.position.set(0, 2.5, 0.4); 
        pivot.rotation.order = "YXZ"; 
        scene.add(pivot);

        const arms = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.1, 2), skinMat);
        arms.position.set(0, -1, 0); pivot.add(arms);

        const grip = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 0.8), gripMat);
        grip.position.set(0, -2.2, 0); pivot.add(grip);
        
        const collar = new THREE.Mesh(new THREE.CylinderGeometry(0.065, 0.065, 0.1), collarMat);
        collar.position.set(0, -2.65, 0); pivot.add(collar);

        const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 2.4), shaftMat);
        shaft.position.set(0, -3.9, 0); pivot.add(shaft);

        const clubHead = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.15, 0.35), headMat);
        clubHead.position.set(0.15, -5.15, 0.05); pivot.add(clubHead);

        const ballRadius = 0.1;
        const ball = new THREE.Mesh(new THREE.SphereGeometry(ballRadius, 32, 32), new THREE.MeshLambertMaterial({ color: 0xffffff }));
        ball.position.set(TEE_POS.x, TEE_POS.y, TEE_POS.z);
        scene.add(ball);

        // ==========================================
        // 3. VISION TRACKING ENGINE (Speed Trap + Bounding Box)
        // ==========================================
        const video = document.getElementById('video-stream');
        const cvCanvas = document.getElementById('cv-canvas');
        const cvCtx = cvCanvas.getContext('2d', { willReadFrequently: true });
        const debugText = document.getElementById('debug-text');

        const PROC_WIDTH = 240; 
        const PROC_HEIGHT = 320; 
        
        // Tracking Variables
        let lastBlobPos = null;
        let lastFrameTime = performance.now();
        const SEARCH_RADIUS = 60; // Bounding box size in pixels
        const MID_X = PROC_WIDTH / 2;
        
        let targetRotZ = 0; 
        let currRotZ = 0;   
        let currRotY = 0;

        let ballVelX = 0;
        let ballVelZ = 0;

        const startBtn = document.getElementById('startBtn');
        const calibrateBtn = document.getElementById('calibrateBtn');
        const statusTxt = document.getElementById('status');
        const distanceDisplay = document.getElementById('distanceDisplay');
        const directionDisplay = document.getElementById('directionDisplay');

        const sensitivitySlider = document.getElementById('sensitivity');
        const sensValue = document.getElementById('sensValue');
        sensitivitySlider.addEventListener('input', () => sensValue.innerText = sensitivitySlider.value + "x");

        const smashSlider = document.getElementById('smash');
        const smashValue = document.getElementById('smashValue');
        smashSlider.addEventListener('input', () => smashValue.innerText = smashSlider.value);

        const stimpSlider = document.getElementById('stimp');
        const stimpValue = document.getElementById('stimpValue');
        stimpSlider.addEventListener('input', () => stimpValue.innerText = stimpSlider.value);

        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: PROC_WIDTH }, height: { ideal: PROC_HEIGHT } } 
                });
                video.srcObject = stream;
                video.play();
                
                video.onloadedmetadata = () => {
                    cvCanvas.width = PROC_WIDTH;
                    cvCanvas.height = PROC_HEIGHT;
                    startBtn.style.display = 'none'; 
                    calibrateBtn.style.display = 'block';
                    statusTxt.innerText = "Camera Active. Put red shaft in view.";
                    lastFrameTime = performance.now();
                    trackFrame();
                };
            } catch (err) {
                statusTxt.innerText = "Camera error: " + err.message;
            }
        });

        calibrateBtn.addEventListener('click', () => {
            lastBlobPos = null; 
            ball.position.set(TEE_POS.x, TEE_POS.y, TEE_POS.z);
            ballVelX = 0;
            ballVelZ = 0;
            statusTxt.innerText = "Tracking and Ball Reset";
            distanceDisplay.innerText = `Dist: 0y 0f`;
            directionDisplay.innerText = "Speed: 0.00 m/s";
        });

        function trackFrame() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                cvCtx.drawImage(video, 0, 0, PROC_WIDTH, PROC_HEIGHT);
                const frameData = cvCtx.getImageData(0, 0, PROC_WIDTH, PROC_HEIGHT);
                const data = frameData.data;

                let now = performance.now();
                let dt = (now - lastFrameTime) / 1000;
                lastFrameTime = now;

                let redSumX = 0, redSumY = 0, redCount = 0;

                // Process pixels
                for (let i = 0; i < data.length; i += 4) {
                    let px = (i / 4) % PROC_WIDTH;
                    let py = Math.floor((i / 4) / PROC_WIDTH);

                    // 1. BOUNDING BOX OPTIMIZATION
                    // If we have a locked target, ignore everything outside the search radius
                    if (lastBlobPos) {
                        if (Math.abs(px - lastBlobPos.x) > SEARCH_RADIUS || Math.abs(py - lastBlobPos.y) > SEARCH_RADIUS) {
                            data[i] = 0; data[i+1] = 0; data[i+2] = 0;
                            continue; 
                        }
                    }
                    
                    let r = data[i], g = data[i+1], b = data[i+2];

                    // Detect Red Shaft using RGB ratios
                    if (r > 90 && r > g * 1.5 && r > b * 1.5) {
                        redSumX += px;
                        redSumY += py;
                        redCount++;
                        
                        // Highlight detected red pixels in pure red
                        data[i] = 255; data[i+1] = 0; data[i+2] = 0;
                    } else {
                        // Make all non-matching pixels entirely black
                        data[i] = 0; data[i+1] = 0; data[i+2] = 0;
                    }
                }
                
                // Write pixels back to canvas
                cvCtx.putImageData(frameData, 0, 0);

                // Draw Center Line (Speed Trap Wire)
                cvCtx.strokeStyle = 'rgba(255, 255, 0, 0.4)';
                cvCtx.beginPath();
                cvCtx.moveTo(MID_X, 0);
                cvCtx.lineTo(MID_X, PROC_HEIGHT);
                cvCtx.stroke();

                if (redCount > 10) {
                    let cx = redSumX / redCount;
                    let cy = redSumY / redCount;

                    // Draw Bounding Box and Centroid
                    cvCtx.strokeStyle = 'rgba(0, 255, 0, 0.8)';
                    cvCtx.lineWidth = 2;
                    cvCtx.strokeRect(cx - SEARCH_RADIUS, cy - SEARCH_RADIUS, SEARCH_RADIUS * 2, SEARCH_RADIUS * 2);
                    cvCtx.fillStyle = '#00ff00';
                    cvCtx.beginPath();
                    cvCtx.arc(cx, cy, 4, 0, 2*Math.PI);
                    cvCtx.fill();

                    // --- 1. CONTINUOUS AVATAR ROTATION ---
                    // Map the X position of the centroid to the 3D rotation
                    let sensMulti = parseFloat(sensitivitySlider.value);
                    targetRotZ = (cx - MID_X) * 0.005 * sensMulti;

                    // --- 2. SPEED TRAP COLLISION LOGIC ---
                    if (lastBlobPos && dt > 0) {
                        // Assuming Right-Handed golfer: swing moves from Right (High X) to Left (Low X)
                        let crossed = (lastBlobPos.x > MID_X && cx <= MID_X);

                        if (crossed) {
                            let distPixels = Math.abs(cx - lastBlobPos.x);
                            let speedPixels = distPixels / dt;
                            let rawSpeedMs = speedPixels * 0.003; // Calibrate pixel speed to m/s
                            
                            // Prevent micro-jitters from triggering a hit
                            if (rawSpeedMs > 0.1) {
                                let smash = parseFloat(smashSlider.value);
                                let physicsScale = 0.02; // Scaled specifically for this 3D environment
                                
                                ballVelX = -rawSpeedMs * smash * physicsScale; 
                                ballVelZ = currRotY * rawSpeedMs * smash * physicsScale; 

                                // Calculate the visual readout
                                let currentStimp = parseFloat(stimpSlider.value);
                                let dynamicFriction = 0.0012 * (10 / currentStimp); 
                                let d = calculateDistance(ballVelX, ballVelZ, dynamicFriction);
                                
                                distanceDisplay.innerText = `Dist: ${d.yards}y ${d.feet}f`;
                                directionDisplay.innerText = `Speed: ${rawSpeedMs.toFixed(2)} m/s`;
                                statusTxt.innerText = "IMPACT!";
                            }
                        } else {
                            statusTxt.innerText = "Tracking Shaft...";
                        }
                    }
                    
                    lastBlobPos = {x: cx, y: cy};
                    debugText.innerText = "Tracking Active";
                } else {
                    lastBlobPos = null;
                    targetRotZ = 0; // Return club to center if lost
                    debugText.innerText = `Red pixels: ${redCount}`;
                }
            }
            requestAnimationFrame(trackFrame); 
        }

        // ==========================================
        // 4. PHYSICS ENGINE & ANIMATION
        // ==========================================
        function calculateDistance(velX, velZ, friction) {
            let v0 = Math.sqrt(velX * velX + velZ * velZ);
            let distanceUnits = (v0 * v0) / (2 * friction);
            let rawYards = distanceUnits * 3.5; 
            
            let yards = Math.floor(rawYards);
            let feet = Math.round((rawYards - yards) * 3);
            if (feet === 3) { yards += 1; feet = 0; }
            return { yards, feet };
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Smoothly rotate the mannequin to match targetRotZ
            currRotZ += (targetRotZ - currRotZ) * 0.2;
            pivot.rotation.z = currRotZ;
            pivot.rotation.y = currRotY;

            let currentStimp = parseFloat(stimpSlider.value);
            let dynamicFriction = 0.0012 * (10 / currentStimp); 

            // Move the ball if velocity exists
            if (Math.abs(ballVelX) > 0 || Math.abs(ballVelZ) > 0) {
                ball.position.x += ballVelX;
                ball.position.z += ballVelZ;
                
                let speed = Math.sqrt(ballVelX * ballVelX + ballVelZ * ballVelZ);
                if (speed > dynamicFriction) {
                    let dropX = (Math.abs(ballVelX) / speed) * dynamicFriction;
                    let dropZ = (Math.abs(ballVelZ) / speed) * dynamicFriction;
                    
                    if (ballVelX > 0) ballVelX = Math.max(0, ballVelX - dropX);
                    else ballVelX = Math.min(0, ballVelX + dropX);
                    
                    if (ballVelZ > 0) ballVelZ = Math.max(0, ballVelZ - dropZ);
                    else ballVelZ = Math.min(0, ballVelZ + dropZ);
                } else {
                    ballVelX = 0; ballVelZ = 0;
                }
            }

            renderer.render(scene, camera);
        }
        
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
