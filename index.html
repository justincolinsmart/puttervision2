<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>3D Putter Simulator Pro - Camera Tracking</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #2e8b57; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        #ui-container { 
            position: absolute; 
            top: 15px; 
            left: 50%; 
            transform: translateX(-50%);
            z-index: 10; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            width: 85%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button { 
            padding: 10px 20px; 
            font-size: 16px; 
            font-weight: bold;
            background: #e74c3c; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%;
            transition: 0.2s;
        }
        button:active { background: #c0392b; }
        .slider-group {
            background: #f9f9f9;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .slider-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 12px;
            font-weight: bold;
            color: #333;
            margin-top: 4px;
        }
        .slider-container label { flex-shrink: 0; width: 90px; }
        input[type="range"] { flex-grow: 1; }
        .val-display { width: 35px; text-align: right; color: #e74c3c; }
        
        #status { 
            font-weight: 600; 
            color: #555; 
            text-align: center;
            font-size: 13px;
            margin-top: 5px;
        }
        .data-display {
            font-size: 16px;
            font-weight: 900;
            color: #333; 
            text-align: center;
            background: #f0f8ff;
            padding: 8px;
            border-radius: 8px;
            border: 2px solid #e74c3c;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .dist { color: #b22222; font-size: 20px; }
        .dir { color: #2E8B57; font-size: 14px; }
        
        /* Camera Debug View */
        #cameraContainer {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 120px;
            height: 90px;
            border: 3px solid #fff;
            border-radius: 8px;
            overflow: hidden;
            z-index: 20;
            background: #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #trackerCanvas {
            width: 100%;
            height: 100%;
            transform: scaleX(-1); /* Mirror view like a selfie cam */
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-container">
        <div style="text-align:center; font-weight:bold; color:#333; font-size: 14px;">Place phone facing you. Putt across the camera view.</div>
        
        <div class="slider-group">
            <div class="slider-container">
                <label>Sensitivity:</label>
                <input type="range" id="sensitivity" min="0.5" max="3.0" step="0.1" value="1.5">
                <span id="sensValue" class="val-display">1.5x</span>
            </div>
            <div class="slider-container">
                <label>Smash Factor:</label>
                <input type="range" id="smash" min="1.0" max="1.5" step="0.01" value="1.15">
                <span id="smashValue" class="val-display">1.15</span>
            </div>
            <div class="slider-container">
                <label>Stimp (Green):</label>
                <input type="range" id="stimp" min="6" max="14" step="0.5" value="10">
                <span id="stimpValue" class="val-display">10</span>
            </div>
        </div>

        <button id="startBtn">Start Camera Tracking</button>
        <div id="status">Waiting for camera...</div>
        
        <div class="data-display">
            <div id="distanceDisplay" class="dist">Dist: 0y 0f</div>
            <div id="directionDisplay" class="dir">Face: Locked Square</div>
        </div>
    </div>

    <!-- PIP view for computer vision debugging -->
    <div id="cameraContainer">
        <canvas id="trackerCanvas"></canvas>
    </div>

    <script>
        // --- 1. SETUP THREE.JS SCENE ---
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 6, 2); 

        const TEE_POS = { x: -0.16, y: -2.475, z: 0.45 }; 
        camera.lookAt(TEE_POS.x - 1, TEE_POS.y, TEE_POS.z);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        const gridHelper = new THREE.GridHelper(40, 40, 0xffffff, 0xffffff);
        gridHelper.position.y = -2.575; 
        gridHelper.material.opacity = 0.3;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // --- 2. BUILD THE 3D MANNEQUIN ---
        const skinMat = new THREE.MeshLambertMaterial({ color: 0xffccaa });
        const shirtMat = new THREE.MeshLambertMaterial({ color: 0xe74c3c });
        const pantsMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const clubMat = new THREE.MeshLambertMaterial({ color: 0xdcdcdc });
        const gripMat = new THREE.MeshLambertMaterial({ color: 0x111111 });

        const leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.15, 2), pantsMat);
        leftLeg.position.set(-0.4, 0, 0); 
        scene.add(leftLeg);
        
        const rightLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.15, 2), pantsMat);
        rightLeg.position.set(0.4, 0, 0); 
        scene.add(rightLeg);

        const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.8, 0.6), shirtMat);
        torso.position.set(0, 1.9, 0);
        scene.add(torso);

        const head = new THREE.Mesh(new THREE.SphereGeometry(0.4), skinMat);
        head.position.set(0, 3.2, 0);
        scene.add(head);

        const pivot = new THREE.Group();
        pivot.position.set(0, 2.5, 0.4); 
        pivot.rotation.order = "YXZ"; 
        scene.add(pivot);

        const arms = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.1, 2), skinMat);
        arms.position.set(0, -1, 0);
        pivot.add(arms);

        const grip = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 0.8), gripMat);
        grip.position.set(0, -2.2, 0);
        pivot.add(grip);

        const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.03, 2.5), clubMat);
        shaft.position.set(0, -3.8, 0);
        pivot.add(shaft);

        const clubHead = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.15, 0.3), clubMat);
        clubHead.position.set(0.15, -5, 0.05); 
        pivot.add(clubHead);

        const ballRadius = 0.1;
        const ball = new THREE.Mesh(
            new THREE.SphereGeometry(ballRadius, 32, 32), 
            new THREE.MeshLambertMaterial({ color: 0xffffff })
        );
        ball.position.set(TEE_POS.x, TEE_POS.y, TEE_POS.z);
        scene.add(ball);

        // --- 3. STATE VARIABLES ---
        let targetRotZ = 0;
        let currRotZ = 0;
        
        let ballVelX = 0;
        let ballVelZ = 0;
        let lastClubPos = new THREE.Vector3();
        let currentClubPos = new THREE.Vector3();

        // --- 4. CAMERA TRACKING SETUP ---
        const videoElement = document.createElement('video');
        videoElement.setAttribute('playsinline', '');
        videoElement.setAttribute('autoplay', '');
        
        const trackerCanvas = document.getElementById('trackerCanvas');
        const ctx = trackerCanvas.getContext('2d', { willReadFrequently: true });
        
        // Processing resolution (Keep it small for 60fps performance)
        const C_WIDTH = 160;
        const C_HEIGHT = 120;
        trackerCanvas.width = C_WIDTH;
        trackerCanvas.height = C_HEIGHT;

        let cameraActive = false;

        const startBtn = document.getElementById('startBtn');
        const statusTxt = document.getElementById('status');
        const distanceDisplay = document.getElementById('distanceDisplay');

        const sensitivitySlider = document.getElementById('sensitivity');
        const sensValue = document.getElementById('sensValue');
        sensitivitySlider.addEventListener('input', () => sensValue.innerText = sensitivitySlider.value + "x");

        const smashSlider = document.getElementById('smash');
        const smashValue = document.getElementById('smashValue');
        smashSlider.addEventListener('input', () => smashValue.innerText = smashSlider.value);

        const stimpSlider = document.getElementById('stimp');
        const stimpValue = document.getElementById('stimpValue');
        stimpSlider.addEventListener('input', () => stimpValue.innerText = stimpSlider.value);

        startBtn.addEventListener('click', async () => {
            try {
                // Request front-facing camera
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: C_WIDTH }, height: { ideal: C_HEIGHT } } 
                });
                videoElement.srcObject = stream;
                
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    cameraActive = true;
                    startBtn.style.display = 'none';
                    statusTxt.innerText = "Tracking Active! Move red shaft.";
                };
            } catch (err) {
                statusTxt.innerText = "Error: Allow Camera Access!";
                console.error(err);
            }
        });

        // The core Color Tracking Algorithm
        function trackRedShaft() {
            if (!cameraActive || videoElement.readyState !== videoElement.HAVE_ENOUGH_DATA) return;

            // Draw video to invisible canvas buffer
            ctx.drawImage(videoElement, 0, 0, C_WIDTH, C_HEIGHT);
            const frame = ctx.getImageData(0, 0, C_WIDTH, C_HEIGHT);
            const data = frame.data;

            let sumX = 0;
            let count = 0;

            // Loop through pixels
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i+1];
                let b = data[i+2];

                // THRESHOLD FOR "RED": High Red, Low Green, Low Blue
                // Adjust these numbers if your shaft is lighter/darker
                if (r > 130 && r > g * 1.6 && r > b * 1.6) {
                    // Pixel matches! Get its X coordinate
                    let x = (i / 4) % C_WIDTH;
                    sumX += x;
                    count++;

                    // Color it bright pink in the PIP view for debugging
                    data[i] = 255;   // R
                    data[i+1] = 0;   // G
                    data[i+2] = 255; // B
                }
            }

            // Put modified image back on the canvas so user can see what's tracked
            ctx.putImageData(frame, 0, 0);

            // If we found enough red pixels, move the club
            if (count > 15) {
                let avgX = sumX / count;
                
                // Map the screen X position (0 to 160) to a swing angle (-1 to 1)
                // We invert it since the front camera acts like a mirror
                let normalizedX = -1 * (((avgX / C_WIDTH) - 0.5) * 2); 
                
                let sensMulti = parseFloat(sensitivitySlider.value);
                
                // Set the target 3D rotation based on where the red shaft is on screen
                targetRotZ = normalizedX * sensMulti * 0.8; // 0.8 is a max angle multiplier
            }
        }

        function calculateDistance(velX, velZ, friction) {
            let v0 = Math.sqrt(velX * velX + velZ * velZ);
            let distanceUnits = (v0 * v0) / (2 * friction);
            let rawYards = distanceUnits * 3.5; 
            
            let yards = Math.floor(rawYards);
            let feet = Math.round((rawYards - yards) * 3);
            if (feet === 3) { yards += 1; feet = 0; }
            return { yards, feet };
        }

        // --- 5. ANIMATION & PHYSICS ENGINE ---
        function animate() {
            requestAnimationFrame(animate);
            
            // 1. Run the vision tracker
            trackRedShaft();

            // 2. Smoothly rotate the 3D mannequin to match the tracked target
            currRotZ += (targetRotZ - currRotZ) * 0.15;
            pivot.rotation.z = currRotZ;

            clubHead.getWorldPosition(currentClubPos);
            let currentStimp = parseFloat(stimpSlider.value);
            let dynamicFriction = 0.0012 * (10 / currentStimp); 

            // 3. COLLISION DETECTION
            if (ballVelX === 0 && ballVelZ === 0) {
                let faceWorldX = currentClubPos.x - 0.2; 
                let lastFaceWorldX = lastClubPos.x - 0.2;
                let ballRightEdge = ball.position.x + ballRadius;

                // Check if club passed through the ball
                if (lastFaceWorldX > ballRightEdge && faceWorldX <= ballRightEdge) {
                    let clubSpeed = Math.abs(currentClubPos.x - lastClubPos.x);
                    
                    if (clubSpeed > 0.005) { 
                        let smash = parseFloat(smashSlider.value);
                        let physicsScale = 1.5; 
                        
                        ballVelX = -clubSpeed * smash * physicsScale; 
                        
                        let d = calculateDistance(ballVelX, ballVelZ, dynamicFriction);
                        distanceDisplay.innerText = `Dist: ${d.yards}y ${d.feet}f`;
                        
                        // Auto-reset ball after 4 seconds
                        setTimeout(() => {
                            ballVelX = 0; ballVelZ = 0;
                            ball.position.set(TEE_POS.x, TEE_POS.y, TEE_POS.z);
                        }, 4000);
                    }
                }
            }
            
            lastClubPos.copy(currentClubPos);

            // 4. GREEN ROLLING PHYSICS
            if (Math.abs(ballVelX) > 0 || Math.abs(ballVelZ) > 0) {
                ball.position.x += ballVelX;
                ball.position.z += ballVelZ;
                
                let speed = Math.sqrt(ballVelX * ballVelX + ballVelZ * ballVelZ);
                
                if (speed > dynamicFriction) {
                    let dropX = (Math.abs(ballVelX) / speed) * dynamicFriction;
                    let dropZ = (Math.abs(ballVelZ) / speed) * dynamicFriction;
                    
                    if (ballVelX > 0) ballVelX = Math.max(0, ballVelX - dropX);
                    else ballVelX = Math.min(0, ballVelX + dropX);
                    
                    if (ballVelZ > 0) ballVelZ = Math.max(0, ballVelZ - dropZ);
                    else ballVelZ = Math.min(0, ballVelZ + dropZ);
                } else {
                    ballVelX = 0; ballVelZ = 0;
                }
            }

            renderer.render(scene, camera);
        }
        
        clubHead.getWorldPosition(lastClubPos);
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
